<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Preview 13</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  :root { --bg: #FFFFFF; --text-primary: #111111; --text-secondary: #555555; --text-body: #222222; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text-primary); overflow: hidden; display: flex; flex-direction: column; }
  .header { flex: 0 0 auto; padding: 48px 56px 0; display: flex; align-items: center; gap: 16px; margin-bottom: 36px; }
  .profile-pic { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 32px; }
  .profile-info { display: flex; flex-direction: column; gap: 2px; }
  .profile-name { display: flex; align-items: center; gap: 8px; font-size: 32px; font-weight: 700; }
  .verified { width: 24px; height: 24px; }
  .profile-handle { font-size: 24px; color: var(--text-secondary); }
  .content { flex: 0 0 auto; padding: 0 56px; display: flex; flex-direction: column; gap: 20px; }
  .slide-title { font-size: 40px; font-weight: 900; line-height: 1.15; letter-spacing: -0.5px; }
  .body-text { font-size: 30px; font-weight: 450; color: var(--text-body); line-height: 1.45; }
  .body-text strong { font-weight: 800; color: var(--text-primary); text-transform: uppercase; }
  .screenshot-area { flex: 1; margin: 24px 56px 56px; border-radius: 16px; overflow: hidden; background: linear-gradient(180deg, #1e1e3a 0%, #0d1117 100%); box-shadow: 0 8px 32px rgba(0,0,0,0.15); display: flex; flex-direction: column; padding: 32px; gap: 16px; }
  .mock-bar { height: 14px; border-radius: 7px; background: rgba(255,255,255,0.08); }
  .mock-bar.short { width: 60%; }
  .mock-bar.medium { width: 80%; }
  .mock-bar.long { width: 95%; }
  .mock-bar.accent { background: rgba(29,155,240,0.2); width: 70%; }
  .mock-text { height: 10px; border-radius: 5px; background: rgba(255,255,255,0.05); }
  .mock-text.s { width: 40%; }
  .mock-text.m { width: 65%; }
  .mock-text.l { width: 90%; }
</style>
</head>
<body>
<div class="header">
  <div class="profile-pic">R</div>
  <div class="profile-info">
    <div class="profile-name">
      Gabriel Rubim
      <svg class="verified" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">

      </svg>
    </div>
    <div class="profile-handle">@rubimfx</div>
  </div>
</div>
<div class="content">
  <div class="slide-title">1º - MODO AGENTE (40 usos por mês)</div>
  <div class="body-text">Uma <strong>funcionalidade</strong> avançada que permite à IA <strong>agir</strong> de forma autônoma, <strong>navegando</strong> na web, preenchendo formulários e <strong>realizando</strong> tarefas complexas de ponta a ponta.</div>
</div>
<div class="screenshot-area">
  <div class="mock-bar long"></div>
  <div class="mock-bar medium"></div>
  <div class="mock-text l"></div>
  <div class="mock-text m"></div>

  <div class="mock-bar accent"></div>
  <div class="mock-text l"></div>
  <div class="mock-bar long"></div>
  <div class="mock-bar medium"></div>
  <div class="mock-text s"></div>
  <div class="mock-bar accent"></div>
</div>
</body>
</html>
