<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Preview 09 — Kaique Epic Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800;900&display=swap');

  :root {
    --text-white:    #FFFFFF;
    --text-muted:    rgba(255,255,255,0.7);
    --accent-yellow: #FFD600;
    --accent-red:    #FF3B30;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--text-white);
    overflow: hidden;
    position: relative;
    /* Simulated epic background */
    background:
      linear-gradient(180deg,
        #0a0a2e 0%,
        #1a0a3e 30%,
        #2d0a1e 60%,
        #0a0a0a 100%
      );
  }

  .bg-overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    background:
      radial-gradient(ellipse 800px 600px at 50% 35%, rgba(255,100,50,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 600px 400px at 30% 50%, rgba(100,50,255,0.1) 0%, transparent 60%),
      linear-gradient(180deg,
        rgba(0,0,0,0.1) 0%,
        rgba(0,0,0,0.05) 20%,
        rgba(0,0,0,0.25) 50%,
        rgba(0,0,0,0.7) 75%,
        rgba(0,0,0,0.92) 100%
      );
  }

  /* Stars/particles effect */
  .particles {
    position: absolute;
    inset: 0;
    z-index: 3;
    background-image:
      radial-gradient(1px 1px at 100px 200px, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 300px 150px, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 500px 100px, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 700px 300px, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 200px 400px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 800px 200px, rgba(255,255,255,0.4), transparent),
      radial-gradient(2px 2px at 400px 500px, rgba(255,200,50,0.6), transparent),
      radial-gradient(1px 1px at 600px 450px, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 150px 600px, rgba(100,150,255,0.5), transparent),
      radial-gradient(1px 1px at 900px 500px, rgba(255,255,255,0.4), transparent);
  }

  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 56px 48px;
  }

  .headline {
    font-family: 'Anton', 'Impact', sans-serif;
    font-size: 96px;
    font-weight: 400;
    line-height: 0.95;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-white);
    text-shadow:
      0 2px 8px rgba(0,0,0,0.6),
      0 4px 24px rgba(0,0,0,0.4);
    margin-bottom: 28px;
  }

  .headline .hl-yellow { color: var(--accent-yellow); }

  .sources {
    font-size: 20px;
    font-weight: 500;
    color: var(--text-muted);
    line-height: 1.4;
    margin-bottom: 32px;
    padding-right: 40px;
  }

  .sources strong {
    color: var(--text-white);
    font-weight: 700;
  }

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.15);
  }

  .cta-arrasta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .cta-arrows {
    font-size: 24px;
    color: var(--accent-yellow);
    letter-spacing: 2px;
  }

  .handle {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .slide-dots {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
  }

  .dot.active {
    background: var(--text-white);
    width: 12px;
    height: 12px;
  }
</style>
</head>
<body>

<div class="bg-overlay"></div>
<div class="particles"></div>

<div class="content">
  <div class="headline">O BRASIL TÁ PRESTES A REGULAR A <span class="hl-yellow">IA.</span> E NINGUÉM SABE O QUE VEM.</div>

  <div class="sources">
    <strong>Fontes:</strong> Folha de S.Paulo, Aos Fatos, Valor Econômico, Câmara dos Deputados, Senado Federal, Convergência Digital, Regulations.AI, Economy News Brasil
  </div>

  <div class="bottom-bar">
    <div class="cta-arrasta">
      ARRASTA PRO LADO <span class="cta-arrows">&gt;&gt;&gt;</span>
    </div>
    <div class="handle">@RUBIMFX</div>
  </div>

  <div class="slide-dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

</body>
</html>
