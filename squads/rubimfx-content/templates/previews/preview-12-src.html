<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Preview 12</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  :root { --bg-dark: #0a0a0a; --text-white: #FFFFFF; --text-muted: rgba(255,255,255,0.5); --accent-red: #FF2D2D; --accent-yellow: #FFD600; --glow-red: rgba(255,45,45,0.3); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; background: var(--bg-dark); font-family: 'Inter', sans-serif; color: var(--text-white); overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .bg-glow { position: absolute; inset: 0; z-index: 1; background: radial-gradient(ellipse 600px 500px at 50% 30%, var(--glow-red) 0%, transparent 60%), radial-gradient(ellipse 400px 300px at 30% 20%, rgba(255,100,50,0.1) 0%, transparent 50%), var(--bg-dark); }
  .photo-area { position: relative; z-index: 5; flex: 0 0 600px; overflow: hidden; background: radial-gradient(ellipse 500px 500px at 50% 40%, rgba(255,50,50,0.15) 0%, transparent 60%), radial-gradient(ellipse 300px 300px at 50% 50%, rgba(100,80,120,0.3) 0%, transparent 50%), linear-gradient(180deg, #1a0a0a 0%, #0a0a0a 100%); }
  .silhouette { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); width: 400px; height: 500px; border-radius: 40% 40% 35% 35%; background: radial-gradient(ellipse 250px 300px at 50% 40%, rgba(200,170,150,0.25) 0%, transparent 70%); }
  .photo-area::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 250px; background: linear-gradient(180deg, transparent 0%, var(--bg-dark) 100%); }
  .tag-badge { position: absolute; bottom: 200px; left: 48px; z-index: 10; background: var(--accent-red); padding: 10px 24px; font-size: 22px; font-weight: 800; color: var(--text-white); letter-spacing: 2px; text-transform: uppercase; }
  .headline-area { position: relative; z-index: 10; padding: 0 48px; margin-top: -40px; flex: 1; display: flex; flex-direction: column; justify-content: flex-start; gap: 24px; }
  .headline { font-size: 64px; font-weight: 900; line-height: 1.0; letter-spacing: -1px; text-transform: uppercase; }
  .headline .hl-yellow { color: var(--accent-yellow); }
  .cta-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--accent-red); padding: 12px 28px; font-size: 24px; font-weight: 800; color: var(--accent-yellow); letter-spacing: 1px; width: fit-content; }
  .ticker-bar { position: relative; z-index: 10; background: var(--bg-dark); border-top: 1px solid rgba(255,255,255,0.08); padding: 16px 0; overflow: hidden; white-space: nowrap; }
  .ticker-content { display: inline-block; font-size: 20px; font-weight: 600; color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; }
  .ticker-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-red); margin: 0 16px; vertical-align: middle; }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="photo-area">
  <div class="silhouette"></div>
  <div class="tag-badge">GUIA COMPLETO DE TRADING</div>
</div>
<div class="headline-area">
  <div class="headline">VOCÊ OPERA TODO DIA E NÃO ESTÁ USANDO <span class="hl-yellow">10%</span> DO QUE O MERCADO OFERECE</div>
  <div class="cta-badge">SEGUE O FIO, MEU FI &gt;&gt;&gt;&gt;&gt;&gt;&gt;</div>
</div>
<div class="ticker-bar">
  <div class="ticker-content">
    @RUBIMFX <span class="ticker-dot"></span> @RUBIMFX <span class="ticker-dot"></span> @RUBIMFX <span class="ticker-dot"></span> @RUBIMFX <span class="ticker-dot"></span> @RUBIMFX <span class="ticker-dot"></span> @RUBIMFX <span class="ticker-dot"></span> @RUBIMFX <span class="ticker-dot"></span> @RUBIMFX
  </div>
</div>
</body>
</html>
