<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Template 15 — Esteter Tweet Thread</title>
<style>
  /* =========================================
     ESTETER TWEET THREAD — Type B
     Simula post X/Twitter + screenshot de matéria
     Baseado em @economesteter
     ========================================= */
  :root {
    --bg:           #0A0A0A;
    --card:         #16181C;
    --border:       #2F3336;
    --text-primary: #E7E9EA;
    --text-muted:   #71767B;
    --accent-blue:  #1D9BF0;
    --alert-red:    #F4212E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background: var(--bg);
    font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    color: var(--text-primary);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TWITTER CHROME ── */
  .twitter-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 32px 48px 20px;
    border-bottom: 1px solid var(--border);
  }

  .twitter-back {
    font-size: 24px;
    color: var(--text-primary);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .twitter-back::before {
    content: "←";
    font-size: 26px;
  }

  .twitter-domain {
    font-size: 22px;
    color: var(--text-muted);
  }

  /* ── TWEET CARD ── */
  .tweet-card {
    padding: 28px 48px;
    border-bottom: 1px solid var(--border);
  }

  .tweet-profile {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }

  .tweet-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
  }

  .tweet-user-info {
    flex: 1;
  }

  .tweet-name {
    font-size: 24px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tweet-verified {
    color: var(--accent-blue);
    font-size: 22px;
  }

  .tweet-handle {
    font-size: 22px;
    color: var(--text-muted);
  }

  .show-translation {
    font-size: 22px;
    color: var(--accent-blue);
    margin-bottom: 18px;
    cursor: pointer;
  }

  /* ── NUMBERED POINT ── */
  .numbered-point {
    margin-bottom: 16px;
  }

  .point-number {
    font-size: 32px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .point-title {
    font-size: 32px;
    font-weight: 800;
    color: var(--text-primary);
    display: inline;
  }

  /* ── TWEET BODY ── */
  .tweet-body {
    font-size: 30px;
    font-weight: 500;
    line-height: 1.45;
    color: var(--text-primary);
    margin-bottom: 22px;
  }

  .tweet-body strong {
    font-weight: 800;
    color: #FFFFFF;
  }

  /* ── TIMESTAMP ── */
  .tweet-timestamp {
    font-size: 22px;
    color: var(--text-muted);
    margin-bottom: 18px;
  }

  /* ── ENGAGEMENT BAR ── */
  .engagement-bar {
    display: flex;
    justify-content: space-around;
    padding: 16px 0 0;
    border-top: 1px solid var(--border);
  }

  .engagement-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 22px;
  }

  .engagement-icon {
    font-size: 24px;
  }

  /* ── SCREENSHOT AREA ── */
  .screenshot-area {
    flex: 1;
    padding: 20px 48px 28px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .screenshot-label {
    font-size: 22px;
    color: var(--text-muted);
    margin-bottom: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .screenshot-img {
    flex: 1;
    width: 100%;
    object-fit: cover;
    border-radius: 16px;
    border: 1px solid var(--border);
    min-height: 0;
  }
</style>
</head>
<body>

<!-- TWITTER CHROME HEADER -->
<div class="twitter-header">
  <div class="twitter-back">Post</div>
  <div class="twitter-domain">X.com</div>
</div>

<!-- TWEET CARD -->
<div class="tweet-card">
  <!-- Profile -->
  <div class="tweet-profile">
    <img class="tweet-avatar" src="profile-photo.jpeg" alt="Gabriel Rubim">
    <div class="tweet-user-info">
      <div class="tweet-name">Gabriel Rubim <span class="tweet-verified">✓</span></div>
      <div class="tweet-handle">@rubimfx</div>
    </div>
  </div>

  <!-- Show translation (decorative) -->
  <div class="show-translation">Show translation</div>

  <!-- Numbered point -->
  <div class="numbered-point">
    <span class="point-number">{{SLIDE_NUM}}</span>
    <span class="point-title">{{SECTION_TITLE}}</span>
  </div>

  <!-- Body -->
  <div class="tweet-body">{{BODY}}</div>

  <!-- Timestamp -->
  <div class="tweet-timestamp">20:08 · 17/03/26</div>

  <!-- Engagement -->
  <div class="engagement-bar">
    <div class="engagement-item"><span class="engagement-icon">💬</span> 847</div>
    <div class="engagement-item"><span class="engagement-icon">🔁</span> 2.4K</div>
    <div class="engagement-item"><span class="engagement-icon">❤️</span> 12.8K</div>
    <div class="engagement-item"><span class="engagement-icon">🔖</span> 3.1K</div>
  </div>
</div>

<!-- SCREENSHOT AREA -->
<div class="screenshot-area">
  <div class="screenshot-label">📰 Fonte original</div>
  <img class="screenshot-img" src="{{SCREENSHOT_IMG}}" alt="Screenshot da matéria">
</div>

</body>
</html>
