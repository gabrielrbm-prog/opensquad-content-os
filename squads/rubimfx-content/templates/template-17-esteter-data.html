<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Template 17 — Esteter Data Card</title>
<style>
  /* =========================================
     ESTETER DATA/STATS CARD — Type D
     Métrica grande centralizada + contexto
     Baseado em @economesteter
     ========================================= */
  :root {
    --bg:           #0A0A0A;
    --card:         #16181C;
    --border:       #2F3336;
    --text-primary: #E7E9EA;
    --text-muted:   #71767B;
    --accent-blue:  #1D9BF0;
    --alert-red:    #F4212E;
    --green:        #00BA7C;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background: var(--bg);
    font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    color: var(--text-primary);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── AMBIENT GLOW ── */
  .bg-glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 500px 300px at 50% 40%, rgba(244, 33, 46, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 400px 200px at 50% 55%, rgba(29, 155, 240, 0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 1;
  }

  /* ── PROFILE ROW ── */
  .profile-row {
    position: absolute;
    top: 40px;
    left: 48px;
    right: 48px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 2;
  }

  .profile-pic {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--accent-blue);
  }

  .profile-name {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .profile-handle {
    font-size: 22px;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* ── MAIN METRIC ── */
  .metric-container {
    text-align: center;
    z-index: 2;
    padding: 0 60px;
  }

  .metric-badge {
    display: inline-block;
    padding: 8px 20px;
    background: rgba(244, 33, 46, 0.12);
    border: 1px solid rgba(244, 33, 46, 0.35);
    border-radius: 8px;
    font-size: 22px;
    font-weight: 700;
    color: var(--alert-red);
    margin-bottom: 36px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .metric-value {
    font-size: 72px;
    font-weight: 900;
    color: var(--alert-red);
    line-height: 1.1;
    margin-bottom: 16px;
  }

  .metric-label {
    font-size: 32px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 24px;
    line-height: 1.3;
  }

  .metric-context {
    font-size: 28px;
    font-weight: 500;
    color: var(--text-muted);
    line-height: 1.5;
    max-width: 800px;
    margin: 0 auto;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 120px;
    height: 3px;
    background: var(--border);
    margin: 48px auto;
    z-index: 2;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 24px;
    z-index: 2;
    padding: 0 48px;
    width: 100%;
    max-width: 960px;
  }

  .stat-card {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 20px;
    text-align: center;
  }

  .stat-value {
    font-size: 36px;
    font-weight: 900;
    color: var(--accent-blue);
    margin-bottom: 8px;
  }

  .stat-label {
    font-size: 22px;
    font-weight: 500;
    color: var(--text-muted);
    line-height: 1.3;
  }

  /* ── SOURCE FOOTER ── */
  .source-footer {
    position: absolute;
    bottom: 36px;
    left: 48px;
    right: 48px;
    text-align: center;
    z-index: 2;
  }

  .source-text {
    font-size: 22px;
    color: var(--text-muted);
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<!-- PROFILE ROW -->
<div class="profile-row">
  <img class="profile-pic" src="profile-photo.jpeg" alt="rubimfx">
  <span class="profile-name">Gabriel Rubim ✓</span>
  <span class="profile-handle">@rubimfx</span>
</div>

<!-- MAIN METRIC -->
<div class="metric-container">
  <div class="metric-badge">📊 Dados</div>
  <div class="metric-value">{{METRIC}}</div>
  <div class="metric-label">{{METRIC_LABEL}}</div>
  <div class="metric-context">{{CONTEXT}}</div>
</div>

<div class="divider"></div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-value">{{STAT_1}}</div>
    <div class="stat-label">comparação</div>
  </div>
  <div class="stat-card">
    <div class="stat-value">{{STAT_2}}</div>
    <div class="stat-label">impacto</div>
  </div>
  <div class="stat-card">
    <div class="stat-value">{{STAT_3}}</div>
    <div class="stat-label">período</div>
  </div>
</div>

<!-- SOURCE -->
<div class="source-footer">
  <span class="source-text">Fonte: dados públicos oficiais</span>
</div>

</body>
</html>
