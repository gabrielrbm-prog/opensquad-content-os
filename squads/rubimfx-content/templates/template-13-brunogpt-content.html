<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Template 13 — BrunoGPT Content Slide</title>
<style>
  /* =========================================
     BRUNOGPT CONTENT — Branco limpo + header + screenshot
     Baseado em @brun0gpt
     Uso: Slides internos de tutorial/lista/explicação
     ========================================= */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  :root {
    --bg:            #FFFFFF;
    --text-primary:  #111111;
    --text-secondary:#555555;
    --text-body:     #222222;
    --accent-blue:   #1D9BF0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background: var(--bg);
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--text-primary);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    flex: 0 0 auto;
    padding: 48px 56px 0;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 36px;
  }

  .profile-pic {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }

  .profile-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .profile-name {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 32px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .verified {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }

  .profile-handle {
    font-size: 24px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  /* ── CONTENT ── */
  .content {
    flex: 0 0 auto;
    padding: 0 56px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Title numbered */
  .slide-title {
    font-size: 40px;
    font-weight: 900;
    color: var(--text-primary);
    line-height: 1.15;
    letter-spacing: -0.5px;
  }

  /* Body text */
  .body-text {
    font-size: 30px;
    font-weight: 450;
    color: var(--text-body);
    line-height: 1.45;
    letter-spacing: -0.2px;
  }

  .body-text strong {
    font-weight: 800;
    color: var(--text-primary);
    text-transform: uppercase;
  }

  /* ── SCREENSHOT AREA ── */
  .screenshot-area {
    flex: 1;
    margin: 24px 56px 56px;
    border-radius: 16px;
    overflow: hidden;
    background: #1a1a2e;
    position: relative;
    border: 1px solid rgba(0,0,0,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }

  .screenshot-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Placeholder for screenshot */
  .screenshot-placeholder {
    width: 100%;
    height: 100%;
    background:
      linear-gradient(180deg, #1e1e3a 0%, #0d1117 100%);
    display: flex;
    flex-direction: column;
    padding: 32px;
    gap: 16px;
  }

  .mock-bar {
    height: 12px;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
  }

  .mock-bar.short { width: 60%; }
  .mock-bar.medium { width: 80%; }
  .mock-bar.long { width: 95%; }
  .mock-bar.accent { background: rgba(29,155,240,0.2); width: 70%; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <img class="profile-pic" src="{{PROFILE_PHOTO}}" alt="Profile">
  <div class="profile-info">
    <div class="profile-name">
      {{DISPLAY_NAME}}
      <svg class="verified" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568s-.969.854-1.24 1.44c-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.688-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.634.433 1.218.877 1.688.47.443 1.054.747 1.687.878.633.132 1.29.084 1.897-.136.274.586.705 1.084 1.246 1.439.54.354 1.17.551 1.816.569.647-.016 1.276-.213 1.817-.567s.972-.854 1.245-1.44c.604.239 1.266.296 1.903.164.636-.132 1.22-.438 1.69-.882.445-.47.749-1.055.878-1.687.13-.633.08-1.29-.144-1.896.587-.274 1.087-.705 1.443-1.246.354-.54.553-1.17.57-1.817zm-6.081.414L9.24 16.8a.75.75 0 01-1.06 0l-2.52-2.52a.75.75 0 111.06-1.06l1.99 1.99 4.544-4.992a.75.75 0 011.103 1.014l-.002.002z" fill="#1D9BF0"/>
      </svg>
    </div>
    <div class="profile-handle">@{{USERNAME}}</div>
  </div>
</div>

<!-- Content -->
<div class="content">
  <div class="slide-title">{{SLIDE_TITLE}}</div>
  <div class="body-text">{{BODY_TEXT}}</div>
</div>

<!-- Screenshot area -->
<div class="screenshot-area">
  <!-- Use <img src="{{SCREENSHOT}}"> for real screenshots -->
  <!-- Or keep placeholder for template preview -->
  <div class="screenshot-placeholder">
    <div class="mock-bar long"></div>
    <div class="mock-bar medium"></div>
    <div class="mock-bar short"></div>
    <div class="mock-bar accent"></div>
    <div class="mock-bar long"></div>
    <div class="mock-bar medium"></div>
    <div class="mock-bar short"></div>
    <div class="mock-bar accent"></div>
    <div class="mock-bar long"></div>
    <div class="mock-bar medium"></div>
  </div>
</div>

</body>
</html>
