<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Template 18 — Esteter CTA Final</title>
<style>
  /* =========================================
     ESTETER CTA FINAL — Type E
     Gradiente escuro + branding @rubimfx
     Baseado em @economesteter
     ========================================= */
  :root {
    --text-primary: #E7E9EA;
    --text-muted:   #71767B;
    --accent-blue:  #1D9BF0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background: linear-gradient(160deg, #0A0A0A 0%, #0D1117 30%, #161B22 50%, #1A1E2E 70%, #1E2340 85%, #1D2951 100%);
    font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    color: var(--text-primary);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── AMBIENT GLOW ── */
  .bg-glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 50% 45%, rgba(29, 155, 240, 0.12) 0%, transparent 55%),
      radial-gradient(ellipse 400px 250px at 30% 60%, rgba(88, 66, 186, 0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 1;
  }

  /* ── CONTENT ── */
  .cta-content {
    text-align: center;
    z-index: 2;
    padding: 0 60px;
  }

  /* ── PROFILE PHOTO ── */
  .cta-avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid var(--accent-blue);
    margin-bottom: 40px;
    box-shadow: 0 0 40px rgba(29, 155, 240, 0.25);
  }

  /* ── MAIN CTA TEXT ── */
  .cta-headline {
    font-size: 48px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .cta-handle {
    font-size: 44px;
    font-weight: 900;
    color: var(--accent-blue);
    margin-bottom: 36px;
  }

  /* ── SUBTEXT ── */
  .cta-subtext {
    font-size: 28px;
    font-weight: 500;
    color: var(--text-muted);
    line-height: 1.5;
    max-width: 700px;
    margin: 0 auto 48px;
  }

  /* ── FOLLOW BUTTON ── */
  .follow-btn {
    display: inline-block;
    padding: 20px 72px;
    background: var(--accent-blue);
    color: #FFFFFF;
    font-size: 28px;
    font-weight: 800;
    border-radius: 50px;
    margin-bottom: 48px;
    box-shadow: 0 4px 24px rgba(29, 155, 240, 0.35);
  }

  /* ── FEATURES ── */
  .features {
    display: flex;
    gap: 40px;
    margin-bottom: 0;
  }

  .feature {
    text-align: center;
  }

  .feature-icon {
    font-size: 36px;
    margin-bottom: 8px;
  }

  .feature-text {
    font-size: 22px;
    color: var(--text-muted);
    font-weight: 600;
  }

  /* ── BOTTOM BRANDING ── */
  .bottom-brand {
    position: absolute;
    bottom: 48px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 2;
  }

  .brand-line {
    font-size: 22px;
    color: rgba(255, 255, 255, 0.25);
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="cta-content">
  <!-- Avatar -->
  <img class="cta-avatar" src="profile-photo.jpeg" alt="Gabriel Rubim">

  <!-- Main CTA -->
  <div class="cta-headline">Segue</div>
  <div class="cta-handle">@rubimfx</div>

  <!-- Subtext -->
  <div class="cta-subtext">
    Notícias que o mercado não te conta.<br>
    Trading, política e economia sem filtro.
  </div>

  <!-- Follow Button -->
  <div class="follow-btn">Seguir</div>

  <!-- Features -->
  <div class="features">
    <div class="feature">
      <div class="feature-icon">📊</div>
      <div class="feature-text">Análises</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🚨</div>
      <div class="feature-text">Breaking News</div>
    </div>
    <div class="feature">
      <div class="feature-icon">💰</div>
      <div class="feature-text">Trading</div>
    </div>
  </div>
</div>

<!-- Bottom branding -->
<div class="bottom-brand">
  <div class="brand-line">rubimfx · trading · economia · política</div>
</div>

</body>
</html>
