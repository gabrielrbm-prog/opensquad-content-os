<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Template 11 — Hollyfield News Card</title>
<style>
  /* =========================================
     HOLLYFIELD NEWS — Foto real + headline editorial
     Baseado em @hollyfield.ia (108K seguidores)
     Uso: Notícias de IA, tech, mercado — tom jornalístico
     ========================================= */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap');

  :root {
    --bg-dark:       #0a0a0a;
    --bg-header:     rgba(10,10,10,0.85);
    --text-white:    #FFFFFF;
    --text-muted:    rgba(255,255,255,0.6);
    --accent-orange: #FF6B00;
    --accent-light:  #FF8C33;
    --border-subtle: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background: var(--bg-dark);
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--text-white);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP HEADER BAR ── */
  .header-bar {
    flex: 0 0 auto;
    background: var(--bg-header);
    border-bottom: 1px solid var(--border-subtle);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
  }

  .header-handle {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }

  .header-category {
    font-size: 20px;
    font-weight: 500;
    color: var(--text-muted);
    font-style: italic;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-copyright {
    font-size: 18px;
    font-weight: 400;
    color: var(--text-muted);
  }

  .header-logo {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent-orange);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 900;
    color: white;
  }

  /* ── PHOTO AREA (main) ── */
  .photo-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .photo-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  /* Gradient overlay bottom */
  .photo-area::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 55%;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(10,10,10,0.3) 30%,
      rgba(10,10,10,0.75) 60%,
      rgba(10,10,10,0.95) 85%,
      var(--bg-dark) 100%
    );
    pointer-events: none;
  }

  /* Company logo overlay (optional) */
  .company-logo {
    position: absolute;
    top: 24px;
    right: 32px;
    z-index: 10;
    max-width: 160px;
    max-height: 60px;
  }

  /* ── BOTTOM TEXT AREA ── */
  .text-area {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 0 48px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Brand row */
  .brand-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--accent-orange);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .brand-icon svg {
    width: 22px;
    height: 22px;
    fill: white;
  }

  .brand-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .brand-name {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 22px;
    font-weight: 700;
    color: var(--text-white);
  }

  .brand-verified {
    width: 18px;
    height: 18px;
  }

  .brand-handle-small {
    font-size: 18px;
    font-weight: 400;
    color: var(--text-muted);
  }

  /* Headline */
  .headline {
    font-family: 'Inter', sans-serif;
    font-size: 42px;
    font-weight: 800;
    color: var(--text-white);
    line-height: 1.15;
    letter-spacing: -0.5px;
  }

  /* CTA */
  .cta-text {
    font-size: 22px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<!-- Header bar -->
<div class="header-bar">
  <div class="header-handle">@{{USERNAME}}</div>
  <div class="header-category">{{CATEGORY}}</div>
  <div class="header-right">
    <div class="header-copyright">Copyright &copy; 2026</div>
    <div class="header-logo">{{LOGO_LETTER}}</div>
  </div>
</div>

<!-- Photo area -->
<div class="photo-area">
  <img src="{{PHOTO}}" alt="{{PHOTO_ALT}}">

  <!-- Optional company logo -->
  <!-- <img class="company-logo" src="{{COMPANY_LOGO}}" alt="Logo"> -->

  <!-- Text overlay -->
  <div class="text-area">

    <!-- Brand row -->
    <div class="brand-row">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
        </svg>
      </div>
      <div class="brand-info">
        <div class="brand-name">
          {{BRAND_NAME}}
          <svg class="brand-verified" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568s-.969.854-1.24 1.44c-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.688-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.634.433 1.218.877 1.688.47.443 1.054.747 1.687.878.633.132 1.29.084 1.897-.136.274.586.705 1.084 1.246 1.439.54.354 1.17.551 1.816.569.647-.016 1.276-.213 1.817-.567s.972-.854 1.245-1.44c.604.239 1.266.296 1.903.164.636-.132 1.22-.438 1.69-.882.445-.47.749-1.055.878-1.687.13-.633.08-1.29-.144-1.896.587-.274 1.087-.705 1.443-1.246.354-.54.553-1.17.57-1.817zm-6.081.414L9.24 16.8a.75.75 0 01-1.06 0l-2.52-2.52a.75.75 0 111.06-1.06l1.99 1.99 4.544-4.992a.75.75 0 011.103 1.014l-.002.002z" fill="#1D9BF0"/>
          </svg>
        </div>
        <div class="brand-handle-small">@{{USERNAME}}</div>
      </div>
    </div>

    <!-- Headline -->
    <div class="headline">{{HEADLINE}}</div>

    <!-- CTA -->
    <div class="cta-text">{{CTA_TEXT}}</div>

  </div>
</div>

</body>
</html>
