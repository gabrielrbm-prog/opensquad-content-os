<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Mono:wght@700&display=swap');
  :root {
    --bg: #FFFFFF; --text-primary: #0F1419; --text-body: #292F33;
    --text-secondary: #536471; --purple: #593A99; --lilas: #CCB0FF;
    --preto: #040405;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1350px; background: var(--bg);
    font-family: 'Inter', sans-serif; color: var(--text-primary);
    overflow: hidden; display: flex; flex-direction: column;
  }
  .top-section { flex: 0 0 auto; padding: 40px 52px 0; }
  .profile-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .profile-name { display: flex; align-items: center; gap: 7px; font-size: 26px; font-weight: 700; }
  .profile-handle { font-size: 22px; color: var(--text-secondary); margin-top: 2px; }
  .badge {
    display: inline-block; padding: 8px 22px; border-radius: 6px;
    font-size: 15px; font-weight: 800; letter-spacing: 3.5px; text-transform: uppercase;
    background: rgba(89,58,153,0.10); color: var(--purple);
    border: 1px solid rgba(89,58,153,0.25); margin-bottom: 22px;
  }
  .headline {
    font-size: 52px; font-weight: 900; color: var(--text-primary);
    line-height: 1.05; letter-spacing: -1.5px; text-transform: uppercase; margin-bottom: 28px;
  }
  .hl-accent { color: var(--purple); }
  .tool-list { list-style: none; padding: 0; }
  .tool-item {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 0; border-bottom: 1px solid rgba(0,0,0,0.06);
    font-size: 30px; font-weight: 600; color: var(--text-body);
  }
  .tool-item:last-child { border-bottom: none; }
  .tool-num {
    display: flex; align-items: center; justify-content: center;
    width: 44px; height: 44px; border-radius: 10px;
    background: rgba(89,58,153,0.10); color: var(--purple);
    font-size: 22px; font-weight: 900; flex-shrink: 0;
  }
  .tool-name { font-weight: 800; color: var(--text-primary); }
  .tool-arrow { color: var(--purple); margin: 0 4px; }
  .footer-text {
    margin-top: 32px; font-size: 26px; font-weight: 700;
    color: var(--purple); line-height: 1.5;
  }
  .bottom-bar {
    margin-top: auto; padding: 28px 52px;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid rgba(0,0,0,0.06);
  }
  .tagline { font-size: 19px; font-weight: 700; color: var(--text-secondary); letter-spacing: 2px; text-transform: uppercase; }
  .handle-bar { font-size: 19px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px; }
  .slide-dots { display: flex; align-items: center; justify-content: center; gap: 7px; padding-bottom: 28px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(89,58,153,0.2); }
  .dot.active { background: var(--purple); width: 10px; height: 10px; }
</style>
</head>
<body>
<div class="top-section">
  <div class="profile-header">
    <img src="logo-simbolo.jpeg" alt="InvisIA" style="width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0;">
    <div>
      <div class="profile-name">InvisIA
        <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><path d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568s-.969.854-1.24 1.44c-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.688-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.634.433 1.218.877 1.688.47.443 1.054.747 1.687.878.633.132 1.29.084 1.897-.136.274.586.705 1.084 1.246 1.439.54.354 1.17.551 1.816.569.647-.016 1.276-.213 1.817-.567s.972-.854 1.245-1.44c.604.239 1.266.296 1.903.164.636-.132 1.22-.438 1.69-.882.445-.47.749-1.055.878-1.687.13-.633.08-1.29-.144-1.896.587-.274 1.087-.705 1.443-1.246.354-.54.553-1.17.57-1.817zm-6.081.414L9.24 16.8a.75.75 0 01-1.06 0l-2.52-2.52a.75.75 0 111.06-1.06l1.99 1.99 4.544-4.992a.75.75 0 011.103 1.014l-.002.002z" fill="#593A99"/></svg>
      </div>
      <div class="profile-handle">@invisia.ia</div>
    </div>
  </div>
  <div class="badge">📋 RESUMO</div>
  <div class="headline"><span class="hl-accent">5</span> TOOLS<br><span class="hl-accent">5</span> SUPERPODERES</div>
  <ul class="tool-list">
    <li class="tool-item"><span class="tool-num">1</span> <span class="tool-name">Notion AI</span> <span class="tool-arrow">→</span> organização</li>
    <li class="tool-item"><span class="tool-num">2</span> <span class="tool-name">Perplexity</span> <span class="tool-arrow">→</span> pesquisa</li>
    <li class="tool-item"><span class="tool-num">3</span> <span class="tool-name">ElevenLabs</span> <span class="tool-arrow">→</span> voz</li>
    <li class="tool-item"><span class="tool-num">4</span> <span class="tool-name">Ideogram</span> <span class="tool-arrow">→</span> imagens</li>
    <li class="tool-item"><span class="tool-num">5</span> <span class="tool-name">Make</span> <span class="tool-arrow">→</span> automação</li>
  </ul>
  <div class="footer-text">Toda semana tem episódio novo.<br>Salva pra não perder. 🔖</div>
</div>
<div class="bottom-bar">
  <div class="tagline">ONDE O INVISÍVEL GANHA ESCALA</div>
  <div class="handle-bar">@INVISIA.IA</div>
</div>
<div class="slide-dots">
  <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  <div class="dot"></div><div class="dot"></div><div class="dot active"></div><div class="dot"></div>
</div>
</body>
</html>
