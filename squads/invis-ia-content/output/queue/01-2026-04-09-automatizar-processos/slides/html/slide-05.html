<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Mono:wght@700&display=swap');
  :root { --bg: #FFFFFF; --text-primary: #0F1419; --text-body: #292F33; --text-secondary: #536471; --purple: #593A99; --lilas: #CCB0FF; --green: #10B981; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text-primary); overflow: hidden; display: flex; flex-direction: column; }
  .top-section { flex: 0 0 auto; padding: 40px 52px 0; }
  .profile-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .profile-name { display: flex; align-items: center; gap: 7px; font-size: 26px; font-weight: 700; }
  .profile-handle { font-size: 22px; color: var(--text-secondary); margin-top: 2px; }
  .badge { display: inline-block; padding: 8px 22px; border-radius: 6px; font-size: 15px; font-weight: 800; letter-spacing: 3.5px; text-transform: uppercase; background: rgba(16,185,129,0.10); color: var(--green); border: 1px solid rgba(16,185,129,0.30); margin-bottom: 22px; }
  .headline { font-size: 64px; font-weight: 900; color: var(--text-primary); line-height: 1.0; letter-spacing: -1.5px; text-transform: uppercase; margin-bottom: 24px; }
  .hl-green { color: var(--green); }
  .body-text { font-size: 28px; font-weight: 450; color: var(--text-body); line-height: 1.55; }
  .body-text strong { font-weight: 800; color: var(--text-primary); }
  .body-text .accent { font-weight: 800; color: var(--purple); }
  .bottom-section { flex: 1; position: relative; overflow: hidden; margin-top: 24px; }
  .bottom-section img { width: 100%; height: 100%; object-fit: cover; object-position: center center; }
  .bottom-section::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 130px; background: linear-gradient(180deg, transparent 0%, rgba(4,4,5,0.75) 100%); }
  .image-bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; padding: 16px 52px 22px; display: flex; align-items: center; justify-content: space-between; }
  .cta-arrasta { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.82); letter-spacing: 3px; text-transform: uppercase; }
  .cta-arrows { font-size: 22px; color: var(--lilas); }
  .handle { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.82); text-transform: uppercase; letter-spacing: 1.5px; }
  .slide-dots { position: absolute; bottom: 54px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 7px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(204,176,255,0.35); }
  .dot.active { background: var(--lilas); width: 10px; height: 10px; }
</style>
</head>
<body>
<div class="top-section">
  <div class="profile-header">
    <img src="logo-simbolo.jpeg" alt="InvisIA" style="width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0;">
    <div>
      <div class="profile-name">InvisIA
        <svg width="20" height="20" viewBox="0 0 22 22" fill="none"><path d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568s-.969.854-1.24 1.44c-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.688-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.634.433 1.218.877 1.688.47.443 1.054.747 1.687.878.633.132 1.29.084 1.897-.136.274.586.705 1.084 1.246 1.439.54.354 1.17.551 1.816.569.647-.016 1.276-.213 1.817-.567s.972-.854 1.245-1.44c.604.239 1.266.296 1.903.164.636-.132 1.22-.438 1.69-.882.445-.47.749-1.055.878-1.687.13-.633.08-1.29-.144-1.896.587-.274 1.087-.705 1.443-1.246.354-.54.553-1.17.57-1.817zm-6.081.414L9.24 16.8a.75.75 0 01-1.06 0l-2.52-2.52a.75.75 0 111.06-1.06l1.99 1.99 4.544-4.992a.75.75 0 011.103 1.014l-.002.002z" fill="#593A99"/></svg>
      </div>
      <div class="profile-handle">@invisia.ia</div>
    </div>
  </div>
  <div class="badge">PROCESSO 3</div>
  <div class="headline"><span class="hl-green">REUNIÕES</span></div>
  <div class="body-text">
    <strong>Ferramenta:</strong> Fireflies.ai (grátis)<br><br>
    Transcreve reuniões. Gera atas automáticas. Resume 1h de call em 2 minutos.<br><br>
    Resultado: <span class="accent">nunca mais</span> anotar nada em reunião.
  </div>
</div>
<div class="bottom-section">
  <img src="img-meeting.jpg" alt="">
  <div class="image-bottom-bar">
    <div class="cta-arrasta">ARRASTA PRO LADO <span class="cta-arrows">&gt;&gt;&gt;</span></div>
    <div class="handle">@INVISIA.IA</div>
  </div>
  <div class="slide-dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>
</body>
</html>
