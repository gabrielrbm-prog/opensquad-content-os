<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Mono:wght@700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; font-family: 'Inter', sans-serif; color: #FFFFFF; overflow: hidden; position: relative; }
  .bg-image { position: absolute; inset: 0; z-index: 1; }
  .bg-image img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
  .bg-overlay {
    position: absolute; inset: 0; z-index: 2;
    background: linear-gradient(180deg,
      rgba(4,4,5,0.22) 0%,
      rgba(40,19,105,0.20) 25%,
      rgba(40,19,105,0.40) 52%,
      rgba(4,4,5,0.88) 73%,
      rgba(4,4,5,0.99) 100%);
  }
  .logo-header { position: absolute; top: 44px; left: 56px; z-index: 20; }
  .logo-header img { height: 48px; width: auto; opacity: 0.90; }
  .content {
    position: relative; z-index: 10; width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 0 56px 52px;
  }
  .badge {
    display: inline-block; width: fit-content;
    padding: 8px 22px; border-radius: 6px;
    font-size: 15px; font-weight: 800;
    letter-spacing: 3.5px; text-transform: uppercase;
    background: rgba(204,176,255,0.15); color: #CCB0FF;
    margin-bottom: 28px; border: 1px solid rgba(204,176,255,0.35);
  }
  .headline {
    font-size: 84px; font-weight: 900; line-height: 0.92;
    letter-spacing: -2.5px; text-transform: uppercase;
    text-shadow: 0 2px 10px rgba(4,4,5,0.7), 0 4px 28px rgba(40,19,105,0.6);
    margin-bottom: 30px;
  }
  .hl-num { color: #CCB0FF; }
  .hl-accent { color: #CCB0FF; }
  .subtitle {
    font-size: 27px; font-weight: 500;
    color: rgba(255,255,255,0.72);
    line-height: 1.45; margin-bottom: 40px;
    max-width: 820px;
  }
  .bottom-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 24px; border-top: 1px solid rgba(204,176,255,0.22);
  }
  .cta-arrasta {
    display: flex; align-items: center; gap: 10px;
    font-size: 21px; font-weight: 700; color: rgba(255,255,255,0.65);
    letter-spacing: 3px; text-transform: uppercase;
  }
  .cta-arrows { font-size: 22px; color: #CCB0FF; }
  .handle { font-size: 21px; font-weight: 700; color: rgba(255,255,255,0.65); text-transform: uppercase; letter-spacing: 1.5px; }
  .slide-dots { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(204,176,255,0.28); }
  .dot.active { background: #CCB0FF; width: 13px; height: 13px; }
</style>
</head>
<body>
<div class="bg-image">
  <img src="photo-cover.png" alt="">
</div>
<div class="bg-overlay"></div>
<div class="logo-header"><img src="logo-branca.png" alt="InvisIA"></div>
<div class="content">
  <div class="badge">TUTORIAL</div>
  <div class="headline">
    COMO <span class="hl-accent">AUTOMATIZAR</span><br>5 PROCESSOS DO<br>SEU NEGÓCIO COM <span class="hl-num">IA</span>
  </div>
  <div class="subtitle">Passo a passo. Hoje. Sem saber programar.</div>
  <div class="bottom-bar">
    <div class="cta-arrasta">ARRASTA PRO LADO <span class="cta-arrows">&gt;&gt;&gt;</span></div>
    <div class="handle">@INVISIA.IA</div>
  </div>
  <div class="slide-dots">
    <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>
</body>
</html>
